body:
  text: 此位攝對法論説暖等已前名順解脫分簡二乘故故言大乘二加行位即在暖等四善根中此之二位皆屬初劫三通達位即在初地初入地心四修習位始從初地第二住心乃至金剛心位名為修道五究竟位金剛心後解脫道中盡未來際皆此位攝此等五位下文自釋也云何漸次悟入唯識徵第三合謂諸菩薩於識相性資糧位中能深信解在加行位能漸伏除所取能取引發真見在通達位如實通達修習位中如所見理數數修習伏斷除障至究竟位出障圓明能盡未來化有情類復令悟入唯識相性初之二句通下諸位此資糧位非唯信解亦能伏除以未多故略而不説加行位中初伏所取次伏能取伏令不起名為除也通達位中方起無漏現行二智證實相性如實通達修習位中如所證理念念修習伏諸煩惱斷智障等至究竟位全出二障不同小聖名之為圓福智清淨不同菩薩故名為明復盡未來化有情類能令餘人悟識相性初資糧位其相云何別釋五位分之為五此釋初位總問起也頌曰乃至未起識求住唯識性於二取隨眠何未能伏滅舉頌答也長行釋故不預明論曰從發深固大菩提心乃至未起順決擇識求住唯識真勝義性齊此皆是資糧位攝為趣無上正等菩提修集種種勝資糧故為有情故勤求解脫由此亦名順解脫分釋頌初二句始從凡位發菩提心乃至未起順決擇識順決擇識者決擇位識謂此位識作唯識觀求住唯識真勝義性此位未能伏除識相未名求住真唯識性即四十心皆此位攝齊此皆是資糧位攝名資糧者此位所修福智二事資益己身之糧用故或可亦名順解脫分為有情故勤求解脫望涅槃為目涅槃名解脫故此行不違名之為順分者因也支也是解脫因因之一支故名為分前約自利此依利他故此一位二名別此位菩薩依因善友作意資糧四勝力故於唯識義雖深信解而未能了能所取空多住外門修菩薩行故於二取所引隨眠猶未有能伏滅功力令彼不起二取現行釋頌下二句此位菩薩雖依四力而不能伏二取隨眠依因力者即是本有及習所成二種性也依善友力者即是諸佛作意力者由決定故體也以法我執而為其首生餘障故見疑無明愛恚慢等者此出體性頭數與煩惱障同若煩惱障中必有此然煩惱障粗有中類二乘所斷唯是不善有覆性故以數束顯今所知障細無多品類唯菩薩斷亦是異熟無記所攝故不顯數又顯法執無明五住地中唯一住攝前障住地四住地攝故不顯數若爾何故不言諸隨既言慢等等隨無失所知境者有為無為無顛倒性謂真如理由覆此境令智不生能障菩提名所知障前煩惱障煩惱即障唯持業釋此所知障障於所知即依主釋故二別也此所知障決定不與異熟識俱彼微劣故不與無明慧相應故法空智品與俱起故下約識分別此明第八識因破外執第八識中必無此執彼異熟識微細劣弱然此法執粗而必強必是能熏非彼俱也然安慧師計有執者論主破云不與無明慧相應故諸論皆説此第八識唯與遍行五數相應不與無明慧相應故法執必與此二俱故又諸菩薩入法空智得與第八異熟識俱八若有執不得俱故應如第七非法空俱七轉識內隨其所應或少或多如煩惱説眼等五識無分別故法見疑等定不相應餘由意力皆容引起明前七識無離煩惱別起此執故此執數與煩惱同若第七識本惑有四隨惑有八及別境慧有十三法若第六識一切具足五識唯有根本三惑隨惑十種合與十三法執相應無見疑者以五識無有計度分別故即忿等十全餘十少分計度分別之所生者五識皆無非無見道所斷諸惑名無分別雖無自力起分別惑由意引故起亦無失此障但與不善無記二心相應論説無明唯通不善無記性故癡無癡等不相應故三性分別但與不善無記相應大論五十九説在上界者唯無記故下通不善以癡無癡不相應故那破安慧三性心中皆有執也煩惱障中此障必有彼定用此為所依故體雖無異而用有別故二隨眠隨聖道用有勝有劣斷或前後此辨寬狹若煩惱障中必有此所知障彼煩惱障定用此障以為所依法執寬故煩惱所緣必是法故體雖無異同一種生而用有別為障涅槃菩提異故斷或前後者或有先斷煩惱障不斷所知如二乘等或有先斷所知障不斷煩惱障如初地中住出心等後地菩薩依種説故或有俱斷如菩薩見道或俱不斷如異生等此於無覆無記性中是異熟生非餘三種彼威儀等勢用薄弱非覆所知障菩提故此名無覆望二乘説若望菩薩亦是有覆無覆無記雖有四種此障唯是異熟無記餘威儀等三無記者勢力薄弱不覆所知障菩提故若異熟生勢強盛通作意生計度所起能覆所知障菩提故言無覆者望二乘説二無學位可得現行若望菩薩亦是有覆障菩提故若所知障有見疑等如何此種契經説為無明住地外人難也若此障中亦有見疑何故勝鬘經中説所知障為無位地不疑等諸住地耶以彼經中説五住地一見一處住地二欲愛住地三色愛住地四有愛住地五無明住地初唯見道所斷煩惱迷諦理勝故一處為言一處斷故言見一處住地次欲愛等三種住地修道煩惱有三品類通迷事理約界言之分為三種彼之一種見修所斷諸所知障總名無明住地無品數故無有別迷諸諦行相故總立為無明住地地者依止義即諸種子與現為依故名為地敘外難也下論主答無明增故總名無明非無見等如煩惱種立見一處欲色有愛四住地名豈彼更無慢無明等所知障中無明增故立無明名非無見等所餘煩惱言無明增者迷一切境障一切智故名為增又煩惱種見修皆有然分別起者立見一處名豈分別中更無貪等修道之中唯説欲愛色有愛等豈彼更無嗔等惑耶然初唯見後唯説愛既見所斷見力偏增分別首故故修所斷愛力偏增潤生惑故法執住地無明力增故説無明非無餘也如是二障分別起者見所斷攝任運起者修所斷攝二乘但能斷煩惱障菩薩俱斷永斷二種唯聖道能伏二現行通有漏道二斷可知約人別者二乘但能斷煩惱障求涅槃故所知不障菩薩俱斷障二果故若有漏道伏煩惱時此俱法執亦不起故名伏法執非別起道而伏彼也若無漏道必斷種故菩薩住此資糧位中二粗現行雖有伏者而於細者及二隨眠止觀力微未能伏滅此位菩薩二障麁者可有伏義即因耶師耶教等者若自思察分別細惑及二種子定慧力微未能伏滅上釋頌訖下釋位名此位未證唯識真如依勝解力修諸勝行應知亦是解行地攝此釋位也攝大乘論攝此五位總為四地謂勝解行地見修無學地言勝解者即決定義散心決定意解思惟未證解故此亦名勝解行地所修勝行其相云何下釋修行此問略有二種為福及智諸勝行中慧為性者皆名為智餘名為福此明福智二種所行此總文也且依六種波羅蜜多通相皆二別相前五説為福德第六智慧或復前三唯福德攝後一唯智餘通二種通相皆二者與智俱行助成智者皆名為智與福同時明成福者皆名為福此依助伴出體剋性出體者前五名福非智性故後一智慧非福性故或可前三唯名為福遠智慧故後一唯智性是慧故精進禪定通福及智大論七十八云若依精進修布施等名之為福若依精進修三慧等名之為智若依靜慮修四無量名之為福若依靜慮修三慧等名之為智復有二種謂利自他所修勝行隨意樂力一切皆通自他利行依別相説六到彼岸菩提分等自利行攝四種攝事四無量等一切皆是利他行攝如是等行差別無邊皆是此中所修勝行二利行也通相皆通若別相者六度菩提分不共相好皆名自利四種攝事布施愛語利行同事四無量心慈悲喜捨皆利他行此等諸法皆是此位所修勝行也此位二障雖未伏除修勝行時有三退屈而能事練磨其心於所證修勇猛不退下釋練磨練為陶練磨為瑩磨此總文也一聞無上正等菩提廣大深遠心便退屈引他己證大菩提者練磨自心勇猛不退第一菩提廣大屈引他況己練廣者無邊大者無上深者難測遠者時長由此義故遂便退屈應引已證大菩提者而練磨也凡夫修而證果我同彼類何故退耶故攝論頌云十方世界諸有情念遠證善逝果彼既丈夫我亦爾不應自輕而退屈廣如餘釋二聞施等波羅蜜多甚難可修心便退屈省己意樂能修施等練磨自心勇猛不退第二萬行難修屈省己增修練若聞施等心退屈者應自省察而漸行之練磨其心便不退屈也三聞諸佛圓滿轉依極難可證心便退屈引他粗善況己妙因練磨自心勇猛不退由斯三事練磨其心堅固熾然修諸勝行第三轉依難證屈引粗況妙練若聞佛果轉依難證而退屈者引他粗善如行施等尚感貴樂況我所修清淨妙善而無果耶菩薩由此三種練磨故修勝行而無退屈次加行位其相云何釋第二加行位此問起也頌曰現前立少物謂是唯識性以有所得故非實住唯識舉頌答也論曰菩薩先於初無數劫善修福德智慧資糧順解脫分既圓滿已為入見道住唯識性復修加行伏除二取謂燸頂忍世第一法此四總名順決擇分順趣真實決擇分故近見道故立加行名非前資糧無加行義顯位所由并列名字此四善根兩屬初劫滿心修習故云先於初無數劫為修福德智慧資糧解脫分滿欲進見道伏除二取修四善根謂燸頂忍世第一法而四總名順決擇分順趣真實決擇分者決擇是智即擇法也決擇即分名決擇分決簡疑品彼猶預故擇簡見品彼不擇故疑品擇而不決見品決而不擇故此智品名決擇分分者支義自義即擇法覺支謂在見道此無漏故名為真實為有漏者非真實故此燸等四順趣彼分名順決擇分猶近見道猶名加行非前資糧無加行義顯前資糧位亦名加行故燸等四法依四尋思四如實智初後位立四尋思者尋思名義自性差別假有實無如實遍知此四離識及識非有名如實智此下釋位所修之法初二位尋思觀後二位實智觀故言初後位立四尋思者一尋思名二尋思義三尋思名義自性四尋思名義差別尋思此四皆假有故四如實智者前四尋思觀計所執四境離識非有唯觀所取無未觀能取此如實智忍可前境離識非有所取空已復能遍知能取彼識離識內境決定非有能取亦空了知內識及所變相互不相離如幻事等名知實智問何故諸法名義各別尋求名義自性及與差別即合觀察名義相異故別尋求二二相同故合思察謂名義二種一自性同二差別同故合名義二種自性及二差別合為觀也依明得定發下尋思觀無所取立為燸位謂此位中創觀所取名等四法皆自心變假施設有實不可得初獲慧日前行相故立明得名即此所獲道火前相故亦名燸明得是定尋思是慧故名為發唯觀所取名義四法但自心變實不可得猶獲慧日定名明得道火前相故得燸名即初位也依明增定發上尋思觀無所取立為頂位謂此位中重觀所取名等四法皆自心變假施設有實不可得明相轉盛故名明增尋思位極故復名頂前明得定依下尋思此明增定依上尋思頂者極義轉盛名增餘文易見此第二位也依印順定發下如實智於無所取決定印持無能取中亦順樂忍既無實境離能取識寧有實識離所取境所取能取相待立故印順忍時總立為忍印前順後立印順名忍境識空故亦名忍印前所取無順後能取無名為印順定於前頂位無所取中決定印持於中上忍無能取中亦順樂忍然此忍中總分三品下品忍者名為印忍印所取無故若中品忍名為樂順樂無能取順修彼故若上品忍但名印順印能取無順觀彼故故合三忍名印順定忍者智也與印順俱定名印順定境識相待境既是無識體寧有故印順忍總名忍也印順定者印前所取無順後能取無故名印順此三品忍忍境忍識皆悉是空故俱名忍第三位也依無間定發上如實智印二取空立世第一法謂前上忍唯印能取空今世第一法二空雙印從此無間必入見道故立無間名異生法中此最勝故名世第一法見道相鄰故名無間能所二取皆印是空異生中勝名世第一第四位也如是燸頂依能取識觀所取空下忍起待印境空相中忍轉位於能取識如境是空順樂忍可上忍起位印能取空世第一法雙印空相總釋上位燸頂可知然三忍內中忍之中順樂忍可者順樂後位上品之忍順無能取餘文易知皆帶相故未能證實故説菩薩此四位中猶於現前安立少物謂是唯識真勝義性以彼空有二相未除帶相觀心有所得故非實安住真唯識理彼相滅已方實安住釋頌文也心上變如名為少物此非無相故名帶相若證真時此相便滅相者即是空所執相有依他相名空有相謂有空相是彼唯識真勝義性由有此相未證真理滅空有相方證真故也依如是義故有頌言菩薩於定位觀影唯是心義想既滅除審觀唯自想如是住內心知所取非有次能取亦無後觸無所得攝論頌也菩薩於定位者顯非散位觀影唯是心者觀內心境離心非有即在燸位義想既滅除審觀唯自想者唯有內心此在頂位以上總是燸頂二位如是住內心知所取非有此二句下忍位次能取亦無中上忍位合此三忍俱印二空即世第一法以時少故從忍位説後觸無所得即是道位也此加行位未遣相縛於麁重縛亦未能斷唯能伏除分別二取違見道故於俱生者及二隨眠有漏觀心有所得故有分別故未全伏除全未能滅言相縛者即是相分縛見分等麁重縛者為有漏隨眠煩惱習等此位菩薩未斷二縛唯能伏除分別二取以彼二取違見道故若俱生取及二種子未令除滅未得無漏有所得故有分別故此位菩薩於安立諦非安立諦俱學觀察為引當來二種見故及伏分別二種障故非安立諦是正所觀非如二乘唯觀安立勝髣經説有作無作二四聖諦無作聖諦即非安立有差別名言者名為安立無差別離名言者名非安立安立者施設義此位菩薩若不作二觀者不能引彼真相見二種生故亦不能伏二乘者故然非安立正所觀也菩薩起此燸等善根雖方便時通諸靜慮而依第四方得成滿託最勝依入見道故唯依欲界善趣身起餘慧猒心非殊勝故初修燸等四善根時通前靜慮若成滿位要依第四託最勝依入見道故然所依身必是欲界善趣身者色無色身彼之猒心非殊勝故欲界惡趣彼之慧心非殊勝故顯揚十六頌云極戚非惡趣極欣非上二唯欲界人天佛出世現觀此位亦名解行地攝未證唯識真勝義故若唯攝論四地所收此位亦名解行地攝次通達位其相六何釋第三通達位此問起也頌曰若時於所緣智都無所得爾時住唯識離二取相故舉頌答也論曰若時菩薩於所緣境無分別智都無所得不取種種戲論相故爾時乃名實住唯識真勝義性即證真如智與真如平等平等俱離能取所取相故能所取相俱是分別有所得心戲論現故此略釋頌意若於此時無分別智緣真如境都無所得不取相故不取者無能取執戲論相者無所取相觀真勝義名無所得爾時乃名實住唯識能證之智所證真如俱無二取故名平等以彼二取分別心生此無分別故無二平有義此智二分俱無説無所取能取相故釋智二分有三師別此初師亦俱無二分攝論第六説此智品無二取故有義此智相見俱有帶彼相起名緣彼故第二師云二分俱有帶彼相起有相分名緣彼故有見分此標宗也若無彼相名緣彼者應色智等名聲等智若無見分應不能緣寧可説為緣真如智勿真如性亦是能緣故應許此定見分破前師也破無相分云無似境相名緣彼者應此色智等名此聲等智此色智等上無聲等相故破無見云若無見分應不能緣向説此智名緣如智或真知性應是能緣許見分而能緣故有義此智見有相無説無相取不取相故雖有見分而無分別説非能取非取全無第三師云有見無相大論七十三説此智品無相取者不取相故名無相取雖有見分而無分別故言無取非分無也既無相分何名緣彼雖無相分而可説此帶如相起不離如故如自證分緣見分時不變而緣此亦應爾變而緣者便非親證如後得智應有分別故應許此有見無相此緣真智挾帶真如之體相起故名所緣非帶相分影像而起名緣於如不離如故舉喻明之自證分等緣見分時非帶彼相名所緣故此無分別與後得殊故必無相若有相者應同後得非親證故加行無間此智生時體會真知名通達位初照理故亦名見道釋位名也從加行位更無間隔根本智生名為見道見即是道體者通也會者達也照理名見其義易知然此見道略説有二一真見道謂即所説無分別智實證二空所顯真理實斷二障分別隨眠雖多剎那事方究竟而相等故總説一心下釋見道二種差別一真二相真見道者即以根本無分別智而為其體實證生法二空實斷二障雖多剎那者若一心見道以無間解脫并一勝進名多剎那總名一心非無間中有多念也有義此中二空二障漸證漸斷以有淺深麁細異故有二師釋此初師也二空漸證二障漸斷以理有淺深障有粗細故漸證斷也有義此中二空二障頓證頓斷由意樂力有堪能故第二師云二空頓證二障頓斷前加行時意樂俱斷故入觀位不別為三故知斷證必無前後二相見道此復有二一觀非安立諦有三品心一內遣有情假緣智能除耎品分別隨眠二內遣諸法假緣智能除中品分別隨眠三遍遣一切有情諸法假緣智能除一切分別隨眠前二名法智各別緣故第三名類智總合緣故此釋三心相見道也非安立者所謂真如如前已説內遣者唯緣內身而遣假故有情假者先計有情皆妄所計但有由心似有情現談其無體名之為假緣智者謂能緣心即緣內身為境遣有情假之緣智下皆準知然今此中人法二障各分上下粗者為上細者為下合為四類然二粗者各別除之以智猶弱未雙斷故若上品智方能雙斷此即隨智説為耎等耎者下也初智名耎次智名中勝前劣故後智名上於斷見惑此智最上然初二智未能殊勝別緣內身除我法假第三心斷其智上品廣緣內外若我若法故三別也前二別緣故名法智後一總緣名為類智前智類故法真見道二空見分自所斷障無間解脫別總建立名相見道法者法則放學為義真見道中有二空見分雖亦有自證而不法彼親緣如者即乃放故就見分中有無間解脫隨自所斷障有四見分就無間道中人法二見分各別法故有初二心解脫道中人法二見總法故有第一心顯無間道斷或別故故別法也顯解脫道證理同故故總體之是故論言別總建立名相見道有義此三是真見道以相見道緣四諦故有義此三是相見道以真見道不別緣故有二師説初師云此三品心是真見道以相見道不作三心緣四諦故第二師云是相見道以真見但總緣如何得別緣以為三品也二緣安立諦有十六心此復有二下明十六心相見道有二此初標一者依觀所取能取別立法類十六種心謂於苦諦有四種心一苦法智忍謂觀三界苦諦真如正斷三界見苦所斷二十八種分別隨眠二苦法智謂忍無間觀前真如證前所斷煩惱解脫三苦類智忍謂智無間無漏慧生於法忍智各別內證言後聖法皆是此類四苦類智謂此無間無漏智生審定印可苦類智忍如於苦諦有四種心集滅道諦應知亦爾此十六心八觀真如八觀正智言所取者為即諦理言能取者緣理之智法忍法智緣理為境觀所取也類忍類智緣前智品觀能取也苦諦四中一苦法智忍者苦者苦諦法者即彼證苦諦教智者所為加行道中緣苦法智忍者無漏忍忍前苦法智也此苦法智忍觀苦下知能斷三界見道二十八種分別隨眠欲苦有十上二界苦苦各有九以除真故三界合有二十八也二苦法智者法傳聞此注依御物古抄本實稀代珍籍也書中摘録述記要文加以補釋而不見澀滯之迹矣蓋非稟承基大師衣鉢人奚能致之然未知作者恐非東域傳燈諸宗章疏二録所載崇俊注成唯識論二十卷之殘闕歟行文酷類法華玄贊決擇又如釋三種退屈下云廣如餘釋似讓決擇所明茲應續藏編纂者請聊記私見徐待後學之是正云明治四十二年七月南都法隆學問寺佐伯定胤
